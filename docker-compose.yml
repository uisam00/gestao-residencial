version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: gastos-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-gastosresidenciais}
      POSTGRES_USER: ${DB_USER:-gastos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gastos}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gastos -d gastosresidenciais"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: gastos-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Connection string usada pelo EF Core (MigrationHostedService aplica as migrations na subida).
      ConnectionStrings__DefaultConnection: "Host=${DB_HOST:-postgres};Port=${DB_PORT:-5432};Database=${DB_NAME:-gastosresidenciais};Username=${DB_USER:-gastos};Password=${DB_PASSWORD:-gastos}"
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      # true/1 = executar seeds (admin + categorias/pessoas/transações); false/0 = desabilitar.
      RUN_SEED: ${RUN_SEED:-true}
    ports:
      - "5000:5000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: gastos-frontend
    depends_on:
      - api
    environment:
      # URL que o frontend usa para chamar a API (.NET)
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
    ports:
      - "4173:4173"

volumes:
  pgdata:

