version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: gastos-postgres
    environment:
      POSTGRES_DB: gastosresidenciais
      POSTGRES_USER: gastos
      POSTGRES_PASSWORD: gastos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gastos -d gastosresidenciais"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: gastos-api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: gastos-frontend
    depends_on:
      - api
    ports:
      - "4173:4173"

volumes:
  pgdata:

