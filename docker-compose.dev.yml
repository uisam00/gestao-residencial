services:
  postgres:
    image: postgres:16
    container_name: gastos-postgres-dev
    environment:
      POSTGRES_DB: gastosresidenciais
      POSTGRES_USER: gastos
      POSTGRES_PASSWORD: gastos
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gastos -d gastosresidenciais"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: gastos-api-dev
    working_dir: /src/backend/src/GastosResidenciais.Api
    environment:
      # No Docker, a API deve conectar no Postgres pelo nome do serviço.
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=gastosresidenciais;Username=gastos;Password=gastos"
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/src/backend
    command: ["dotnet", "watch", "run", "--project", "GastosResidenciais.Api.csproj", "--urls", "http://0.0.0.0:5000"]
    ports:
      - "5000:5000"

  frontend:
    image: node:22-alpine
    container_name: gastos-frontend-dev
    working_dir: /app
    environment:
      # Vite/chokidar dentro de container precisam de polling para hot reload
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"

